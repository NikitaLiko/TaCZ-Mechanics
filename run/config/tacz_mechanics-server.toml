[tweaks]
	#Always enable filter by hand option in the gun smith table
	alwaysFilterByHand = true
	#Suppresses the sound that plays when you land a headshot
	suppressHeadHitSounds = false
	#Suppresses the sound that plays when you land a shot that is not a headshot
	suppressFleshHitSounds = false
	#Suppresses the sound that plays when you kill an entity with a gun
	suppressKillSounds = false
	#Hides hit markers when hitting entities
	hideHitMarkers = false
	#Completely hides the gun crosshair (TACZ crosshair)
	hideGunCrosshair = false

[distantFire]
	#Enable distant fire sounds (hear gunshots from far away)
	enabled = true
	#Minimum distance (blocks) for distant fire effect to start
	# Default: 64
	# Range: 16 ~ 500
	minDistance = 64
	#Maximum distance (blocks) to hear distant fire
	# Default: 300
	# Range: 100 ~ 1000
	maxDistance = 300
	#Volume multiplier for distant fire sounds
	# Default: 0.7
	# Range: 0.1 ~ 1.0
	volumeMultiplier = 0.7

[whizz]
	#Enable bullet whizz sounds (hear bullets passing by)
	enabled = true

[ricochet]
	#Enable bullet ricochet off blocks
	enabled = true
	#Enable demo ricochet preset (forces 100% ricochet-friendly values)
	demoPreset = false
	#Enable debug logging for ricochet decisions
	debug = false
	#Minimum bullet speed required to ricochet
	# Default: 1.0
	# Range: 0.05 ~ 100.0
	minSpeed = 1.0
	#Minimum incidence angle (degrees) from surface normal to allow ricochet
	# Default: 60.0
	# Range: 10.0 ~ 89.0
	minAngle = 60.0
	#Maximum number of ricochets per bullet
	# Default: 1
	# Range: 0 ~ 10
	maxBounces = 1
	#Speed multiplier applied after ricochet
	# Default: 0.6
	# Range: 0.1 ~ 1.0
	speedMultiplier = 0.6
	#Chance of ricochet when conditions are met (0.0-1.0)
	# Default: 0.35
	# Range: 0.0 ~ 1.0
	chance = 0.35

[freeAim]
	#Enable free aim - gun direction lags behind camera movement
	enabled = true
	#Maximum angle (degrees) the gun can deviate from view direction
	# Default: 2.5
	# Range: 0.5 ~ 25.0
	maxAngle = 2.5
	#Speed at which the gun catches up to view direction (0.0-1.0, higher = faster)
	# Default: 0.15
	# Range: 0.01 ~ 1.0
	lerpSpeed = 0.15
	#Disable free aim when aiming down sights
	disableWhenAiming = true
	#Scale factor for converting free aim angle to screen pixels
	# Default: 10.0
	# Range: 1.0 ~ 50.0
	crosshairScale = 10.0
	#Disable crosshair movement with free aim (crosshair stays centered)
	disableCrosshairMovement = false

[movement]
	#Enable advanced movement mechanics (sitting, crawling, leaning, sliding)
	enabled = true
	#Enable sitting/crouching pose
	sitEnabled = true
	#Enable crawling/prone pose
	crawlEnabled = true
	#Enable sliding when sprinting + sit key
	slideEnabled = true
	#Maximum sliding force
	# Default: 1.0
	# Range: 0.1 ~ 3.0
	slideMaxForce = 1.0
	#Auto-hold lean position (toggle mode)
	leanAutoHold = false
	#Correct mouse input when leaning
	leanMouseCorrection = true
	#Limit view angle when crawling
	crawlBlockView = true
	#Maximum view angle when crawling (in degrees)
	# Default: 90.0
	# Range: 30.0 ~ 180.0
	crawlBlockAngle = 90.0
	#Cooldown between sit actions (seconds)
	# Default: 0.75
	# Range: 0.0 ~ 5.0
	sitCooldown = 0.75
	#Cooldown between crawl actions (seconds)
	# Default: 0.75
	# Range: 0.0 ~ 5.0
	crawlCooldown = 0.75
	#Cooldown between lean actions (seconds)
	# Default: 0.0
	# Range: 0.0 ~ 5.0
	leanCooldown = 0.0
	#Auto-hold sit position (toggle mode)
	sitAutoHold = true
	#Hitbox height when sitting/crouching
	# Default: 1.2
	# Range: 0.2 ~ 3.0
	sitHeight = 1.2
	#Hitbox width when sitting/crouching
	# Default: 0.6
	# Range: 0.1 ~ 3.0
	sitWidth = 0.6
	#Eye height when sitting/crouching
	# Default: 1.0
	# Range: 0.1 ~ 3.0
	sitEyeHeight = 1.0
	#Hitbox height when crawling
	# Default: 0.6
	# Range: 0.1 ~ 3.0
	crawlHeight = 0.6
	#Hitbox width when crawling
	# Default: 0.6
	# Range: 0.1 ~ 3.0
	crawlWidth = 0.6
	#Eye height when crawling
	# Default: 0.4
	# Range: 0.1 ~ 3.0
	crawlEyeHeight = 0.4
	#Vertical offset for sitting hitbox (positive = up, negative = down)
	# Default: 0.0
	# Range: -5.0 ~ 5.0
	sitYOffset = 0.0
	#Vertical offset for crawling hitbox (positive = up, negative = down)
	# Default: 0.0
	# Range: -5.0 ~ 5.0
	crawlYOffset = 0.0
