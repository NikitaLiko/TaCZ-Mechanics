pluginManagement {
    repositories {
        mavenLocal()
        gradlePluginPortal()
        maven { url = 'https://maven.neoforged.net/releases' }
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}

// Include TACZ as composite build for API access
includeBuild('../../!libs and references/TACZ-1.21.1') {
    dependencySubstitution {
        substitute module('com.tacz.guns:tacz') using project(':')
    }
}
